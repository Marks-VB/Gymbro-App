<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========================================== -->
    <!-- SEO & META TAGS (Para Google e Partilhas)  -->
    <!-- ========================================== -->
    <title>GymBro - Treino de Superiores 🦍</title>
    <meta name="description" content="Vai treinar superiores amanhã, meu nobre? O pré-treino já bateu e a bebida monstruosa gaseificada geladinha tá na mão. Tenta dizer não, se fores capaz! 💪">
    <meta name="keywords" content="gymbro, treino, maromba, superiores, musculação, motivação, pré-treino, monster, shape, góticas">
    <meta name="author" content="Mutante">
    <meta name="theme-color" content="#84cc16"> <!-- Cor verde da barra do navegador no mobile -->

    <!-- Open Graph (WhatsApp, Facebook, Discord, LinkedIn) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="GymBro - Vai treinar superiores, meu nobre? 🦍">
    <meta property="og:description" content="A mente tá blindada e a bebida monstruosa gaseificada geladinha já bateu. Clica aqui e tenta fugir do treino, se tiveres coragem!">
    <!-- A tua imagem de fundo vai aparecer como miniatura do link! -->
    <meta property="og:image" content="fundo.png">
    <meta property="og:image:alt" content="Ginásio sombrio com pesos e a bebida sagrada">
    
    <!-- Twitter Cards (X) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GymBro - Vai treinar superiores, meu nobre? 🦍">
    <meta name="twitter:description" content="A mente tá blindada e a bebida monstruosa gaseificada geladinha já bateu. Clica aqui e tenta fugir do treino, se tiveres coragem!">
    <meta name="twitter:image" content="fundo.png">
    <!-- ========================================== -->

    <!-- Tailwind CSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Bebas Neue', sans-serif;
            background-color: #000; 
            
            /* Imagem de fundo com a leve transparência escura */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('fundo.png');
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: white;
            overflow: hidden; 
            touch-action: manipulation; 
        }

        /* Efeito de vidro no cartão central para dar destaque */
        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #84cc16;
            box-shadow: 0 0 50px rgba(132, 204, 22, 0.3);
        }

        /* Transição suave para o botão fujão */
        #btn-nao {
            transition: top 0.15s ease-out, left 0.15s ease-out;
            z-index: 50;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Contentor Principal -->
    <div id="main-card" class="glass-card relative z-10 w-full max-w-md p-8 rounded-2xl flex flex-col items-center text-center gap-8">
        
        <div class="space-y-2">
            <h2 class="text-lime-500 text-2xl tracking-widest uppercase drop-shadow-md">Protocolo de Amanhã</h2>
            <h1 class="text-5xl md:text-6xl drop-shadow-[0_5px_5px_rgba(0,0,0,1)] text-white">
                VAI TREINAR SUPERIORES MEU NOBRE? 🦍
            </h1>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center items-center mt-4 relative">
            <button id="btn-sim" onclick="aceitarTreino()" 
                class="w-full sm:w-auto px-10 py-4 bg-lime-500 hover:bg-lime-400 text-black text-3xl rounded-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_25px_rgba(132,204,22,0.8)]">
                SIM, PAI! 💪
            </button>

            <button id="btn-nao" 
                class="w-full sm:w-auto px-10 py-4 bg-red-600 text-white text-3xl rounded-xl shadow-[0_0_20px_rgba(220,38,38,0.8)] cursor-not-allowed">
                NÃO 🤡
            </button>
        </div>
    </div>

    <!-- Menção Honrosa no Rodapé -->
    <div class="absolute bottom-6 w-full text-center px-4 pointer-events-none">
        <p class="text-lime-400 text-xl tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,1)] opacity-80 animate-pulse">
            ⚡ Movido a ódio e àquela bebida monstruosa gaseificada geladinha ⚡
        </p>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');

        // Função para fazer o botão "NÃO" fugir
        function moverBotao(e) {
            if(e) e.preventDefault();
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = btnNao.offsetWidth;
            const btnHeight = btnNao.offsetHeight;
            
            // Margem para não sair do ecrã
            const margem = 20;
            const randomX = Math.max(margem, Math.floor(Math.random() * (windowWidth - btnWidth - margem)));
            const randomY = Math.max(margem, Math.floor(Math.random() * (windowHeight - btnHeight - margem)));

            btnNao.style.position = 'fixed';
            btnNao.style.left = randomX + 'px';
            btnNao.style.top = randomY + 'px';
            
            // Remove as classes de largura do mobile para ele ficar quadrado
            btnNao.classList.remove('w-full', 'sm:w-auto');
        }

        // Eventos para o botão fugir (rato e toque)
        btnNao.addEventListener('mouseover', moverBotao);
        btnNao.addEventListener('touchstart', moverBotao, { passive: false });
        btnNao.addEventListener('click', moverBotao); 

        // Função de sucesso ao clicar no "SIM"
        function aceitarTreino() {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <h1 class="text-6xl text-lime-500 drop-shadow-[0_0_30px_rgba(132,204,22,1)] animate-pulse">
                    BORA MUTANTE! 🚀
                </h1>
                <p class="text-2xl text-white mt-6 font-sans font-bold drop-shadow-[0_4px_6px_rgba(0,0,0,1)] bg-black/60 p-6 rounded-xl border border-lime-500/50">
                    A BEBIDA MONSTRUOSA GASEIFICADA GELADINHA JÁ BATEU, A MENTE TÁ BLINDADA E AS GÓTICAS ESTÃO A OLHAR! 
                    <br><br>
                    AMASSA OS PESOS! 🏋️‍♂️
                </p>
            `;
        }
    </script>
</body>
</html>
