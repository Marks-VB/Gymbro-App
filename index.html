<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ========================================== -->
    <!-- SEO & META TAGS -->
    <!-- ========================================== -->
    <title>GymBro - Treinar Hoje? 🦍</title>
    <meta name="description" content="Vai treinar hoje, meu nobre? O pré-treino já bateu. Escolhe aí, superiores ou inferiores? (Aviso: o sistema é viciado em braço!) 💪">
    <meta name="keywords" content="gymbro, treino, maromba, superiores, musculação, motivação, pré-treino, monster, shape, góticas">
    <meta name="author" content="Mutante">
    <meta name="theme-color" content="#84cc16">

    <meta property="og:type" content="website">
    <meta property="og:title" content="GymBro - Vai treinar hoje, meu nobre? 🦍">
    <meta property="og:description" content="A mente tá blindada e a bebida monstruosa gaseificada geladinha já bateu. Vem escolher o treino de hoje!">
    <meta property="og:image" content="fundo.png">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="GymBro - Vai treinar hoje, meu nobre? 🦍">
    <meta name="twitter:description" content="A mente tá blindada e a bebida monstruosa gaseificada geladinha já bateu. Vem escolher o treino de hoje!">
    <meta name="twitter:image" content="fundo.png">
    <!-- ========================================== -->

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Bebas Neue', sans-serif;
            background-color: #000; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            overflow: hidden; 
            touch-action: manipulation; 
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #84cc16;
            box-shadow: 0 0 50px rgba(132, 204, 22, 0.3);
        }

        #btn-nao {
            transition: top 0.15s ease-out, left 0.15s ease-out;
            z-index: 50;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Contentor Principal -->
    <div id="main-card" class="glass-card relative z-10 w-full max-w-lg p-8 rounded-2xl flex flex-col items-center text-center gap-8">
        
        <!-- Tela Inicial: Vai treinar hoje? -->
        <div class="space-y-2">
            <h2 class="text-lime-500 text-2xl tracking-widest uppercase drop-shadow-md">Protocolo de Hoje</h2>
            <h1 class="text-5xl md:text-6xl drop-shadow-[0_5px_5px_rgba(0,0,0,1)] text-white">
                VAI TREINAR HOJE MEU NOBRE? 🦍
            </h1>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center items-center mt-4 relative">
            <button id="btn-sim" onclick="perguntarTreino()" 
                class="w-full sm:w-auto px-10 py-4 bg-lime-500 hover:bg-lime-400 text-black text-3xl rounded-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_25px_rgba(132,204,22,0.8)]">
                SIM, PAI! 💪
            </button>

            <!-- Se ele for ninja e conseguir clicar no NÃO, a função forcarTreino ativa -->
            <button id="btn-nao" onclick="forcarTreino()"
                class="w-full sm:w-auto px-10 py-4 bg-red-600 text-white text-3xl rounded-xl shadow-[0_0_20px_rgba(220,38,38,0.8)] cursor-not-allowed">
                NÃO 🤡
            </button>
        </div>
    </div>

    <!-- Menção Honrosa no Rodapé -->
    <div class="absolute bottom-6 w-full text-center px-4 pointer-events-none">
        <p class="text-lime-400 text-xl tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,1)] opacity-80 animate-pulse">
            ⚡ Movido a ódio e àquela bebida monstruosa gaseificada geladinha ⚡
        </p>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');

        // Lógica do botão fujão
        function moverBotao(e) {
            // Se for evento de toque, impede o clique normal para ele só fugir
            if(e && e.type === 'touchstart') e.preventDefault();
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = btnNao.offsetWidth;
            const btnHeight = btnNao.offsetHeight;
            
            const margem = 20;
            const randomX = Math.max(margem, Math.floor(Math.random() * (windowWidth - btnWidth - margem)));
            const randomY = Math.max(margem, Math.floor(Math.random() * (windowHeight - btnHeight - margem)));

            btnNao.style.position = 'fixed';
            btnNao.style.left = randomX + 'px';
            btnNao.style.top = randomY + 'px';
            btnNao.classList.remove('w-full', 'sm:w-auto');
        }

        // Eventos para o botão fugir
        btnNao.addEventListener('mouseover', moverBotao);
        btnNao.addEventListener('touchstart', moverBotao, { passive: false });

        // ETAPA 2: Escolher o treino (ativado pelo botão SIM)
        function perguntarTreino() {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <div class="space-y-2 animate-fade-in">
                    <h2 class="text-lime-500 text-2xl tracking-widest uppercase drop-shadow-md">Aí Sim, Mutante!</h2>
                    <h1 class="text-5xl md:text-5xl drop-shadow-[0_5px_5px_rgba(0,0,0,1)] text-white">
                        QUAL VAI SER O AMASSO DE HOJE? 🦍
                    </h1>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 w-full justify-center items-center mt-6">
                    <button onclick="confirmarBiceps('superiores')" class="w-full px-8 py-4 bg-lime-500 hover:bg-lime-400 text-black text-3xl rounded-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(132,204,22,0.8)]">
                        SUPERIORES 💪
                    </button>
                    <button onclick="confirmarBiceps('inferiores')" class="w-full px-8 py-4 bg-purple-600 hover:bg-purple-500 text-white text-3xl rounded-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(147,51,234,0.8)]">
                        INFERIORES 🍗
                    </button>
                </div>
            `;
        }

        // ETAPA 3: A Trollagem Final (Tudo vira Bíceps e Tríceps)
        function confirmarBiceps(escolha) {
            const card = document.getElementById('main-card');
            
            let mensagemIronica = "";
            if(escolha === 'inferiores') {
                mensagemIronica = "<span class='text-purple-400'>ACHOU QUE IA TREINAR PERNA? AQUI NINGUÉM TREINA PERNA, MEU NOBRE! 🤡</span><br><br>";
            }

            card.innerHTML = `
                <h1 class="text-5xl md:text-6xl text-lime-500 drop-shadow-[0_0_30px_rgba(132,204,22,1)] animate-pulse">
                    TREINO DE BÍCEPS E TRÍCEPS CONFIRMADO! 🚀
                </h1>
                <p class="text-xl md:text-2xl text-white mt-6 font-sans font-bold drop-shadow-[0_4px_6px_rgba(0,0,0,1)] bg-black/60 p-6 rounded-xl border border-lime-500/50">
                    ${mensagemIronica}
                    A BEBIDA MONSTRUOSA GASEIFICADA GELADINHA JÁ BATEU E AS GÓTICAS ESTÃO A OLHAR! 
                    <br><br>
                    VAI LÁ E AMASSA OS PESOS! 🏋️‍♂️
                </p>
            `;
        }

        // ETAPA ALTERNATIVA: Se ele for ninja e clicar no botão NÃO
        function forcarTreino() {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <h1 class="text-5xl md:text-6xl text-red-500 drop-shadow-[0_0_30px_rgba(220,38,38,1)] animate-pulse">
                    OPÇÃO NEGADA! 🚫
                </h1>
                <p class="text-xl md:text-2xl text-white mt-6 font-sans font-bold drop-shadow-[0_4px_6px_rgba(0,0,0,1)] bg-black/60 p-6 rounded-xl border border-red-500/50">
                    O SHAPE FALA MAIS ALTO QUE A TUA PREGUIÇA!
                    <br><br>
                    TREINO DE BÍCEPS E TRÍCEPS CONFIRMADO COM SUCESSO! 🚀 A BEBIDA MONSTRUOSA JÁ TÁ NA MÃO, VAI AMASSAR! 💪
                </p>
            `;
        }
    </script>
</body>
</html>
