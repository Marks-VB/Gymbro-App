<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymBro - Treino de Superiores</title>
    <!-- Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonte com impacto -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Bebas Neue', sans-serif;
            /* Definições da imagem de fundo */
            background-color: rgba(15, 15, 15, 0.85); /* Escurece a imagem para dar contraste ao texto */
            background-image: url('1772579562476.png'); /* O nome exato da tua imagem */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-blend-mode: overlay; /* Mistura a cor escura com a imagem */
            
            color: white;
            overflow: hidden; /* Impede a rolagem do ecrã quando o botão fugir */
            touch-action: manipulation; /* Melhora o comportamento de toque no telemóvel */
        }

        /* Animação do fundo com as palavras a repetir */
        .bg-texto {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            opacity: 0.15; /* Subtil para não ofuscar a imagem fantástica */
            color: #84cc16; /* Verde Monster */
            font-size: 2.5rem;
            line-height: 1.1;
            user-select: none;
            pointer-events: none;
            transform: rotate(-15deg);
        }

        /* Destaque para a palavra góticas no texto de fundo */
        .gotica {
            color: #c026d3; /* Rosa/Roxo gótico */
            text-shadow: 0 0 10px #c026d3;
        }

        /* Cartão de vidro (Glassmorphism) para destacar os botões */
        .glass-card {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(8px);
            border: 2px solid #84cc16;
            box-shadow: 0 0 40px rgba(132, 204, 22, 0.3);
        }

        /* Transição suave para o botão fugir */
        #btn-nao {
            transition: top 0.2s ease-out, left 0.2s ease-out;
            z-index: 50;
        }
    </style>
</head>
<body class="relative min-h-screen flex items-center justify-center p-4">

    <!-- Fundo de palavras (continua lá, mas subtil) -->
    <div class="bg-texto" id="fundo-palavras"></div>

    <!-- Contentor Principal -->
    <div id="main-card" class="glass-card relative z-10 w-full max-w-md p-8 rounded-2xl flex flex-col items-center text-center gap-8">
        
        <div class="space-y-2">
            <h2 class="text-lime-500 text-2xl tracking-widest uppercase text-shadow">Protocolo de Amanhã</h2>
            <h1 class="text-5xl md:text-6xl drop-shadow-[0_4px_4px_rgba(0,0,0,1)]">
                VAI TREINAR SUPERIORES MEU NOBRE? 🦍
            </h1>
        </div>

        <!-- Botões -->
        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center items-center mt-4 relative">
            
            <button id="btn-sim" onclick="aceitarTreino()" 
                class="w-full sm:w-auto px-10 py-4 bg-lime-500 hover:bg-lime-400 text-black text-3xl rounded-xl transition-all transform hover:scale-105 active:scale-95 shadow-[0_0_20px_rgba(132,204,22,0.8)]">
                SIM, PAI! 💪
            </button>

            <button id="btn-nao" 
                class="w-full sm:w-auto px-10 py-4 bg-red-600 text-white text-3xl rounded-xl shadow-[0_0_20px_rgba(220,38,38,0.8)] cursor-not-allowed">
                NÃO 🤡
            </button>

        </div>
    </div>

    <script>
        // 1. Gerar o fundo com as palavras repetidas
        const fundo = document.getElementById('fundo-palavras');
        const palavrasBase = "TREMBOLONA 💉 MONSTER GELADINHO ⚡ DECA 🦍 <span class='gotica'>GÓTICAS</span> 🖤 ";
        
        // Repete as palavras para cobrir o ecrã
        fundo.innerHTML = palavrasBase.repeat(150);

        // 2. Lógica do botão que foge
        const btnNao = document.getElementById('btn-nao');

        function moverBotao(e) {
            // Previne o clique (especialmente importante no telemóvel)
            if(e) e.preventDefault();

            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = btnNao.offsetWidth;
            const btnHeight = btnNao.offsetHeight;

            // Calcula nova posição com margem de segurança
            const margem = 20;
            const randomX = Math.max(margem, Math.floor(Math.random() * (windowWidth - btnWidth - margem)));
            const randomY = Math.max(margem, Math.floor(Math.random() * (windowHeight - btnHeight - margem)));

            // Altera para 'fixed' para flutuar em todo o ecrã
            btnNao.style.position = 'fixed';
            btnNao.style.left = randomX + 'px';
            btnNao.style.top = randomY + 'px';
            
            // Remove as classes de largura total para o botão não ficar esticado a voar
            btnNao.classList.remove('w-full', 'sm:w-auto');
        }

        // Eventos para Desktop (rato) e Mobile (toque)
        btnNao.addEventListener('mouseover', moverBotao);
        btnNao.addEventListener('touchstart', moverBotao, { passive: false });
        btnNao.addEventListener('click', moverBotao); 

        // 3. Ação de vitória (Botão SIM)
        function aceitarTreino() {
            const card = document.getElementById('main-card');
            card.innerHTML = `
                <h1 class="text-6xl text-lime-500 drop-shadow-[0_0_20px_rgba(132,204,22,1)] animate-pulse">
                    BORA MUTANTE! 🚀
                </h1>
                <p class="text-2xl text-white mt-6 font-sans font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,0.9)] bg-black/50 p-4 rounded-xl">
                    O PRÉ-TREINO JÁ BATEU, A MENTE TÁ BLINDADA E AS GÓTICAS ESTÃO A VER! 
                    <br><br>
                    AMASSA OS PESOS! 🏋️‍♂️
                </p>
            `;
            
            // Opcional: Remover as palavras de fundo para focar na imagem após aceitar
            document.getElementById('fundo-palavras').style.opacity = '0.05';
        }
    </script>
</body>
</html>
